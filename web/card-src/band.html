<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1025px; height: 250px; }
  body {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: space-evenly;
    overflow: hidden;
    font-family: "Arial Black", "Segoe UI", sans-serif;
  }
  .unit { display: flex; align-items: center; gap: 32px; }
  .unit img { width: 96px; height: 96px; display: block; }
  .unit span {
    font-size: 82px;
    font-weight: 900;
    letter-spacing: 2px;
    color: #1d1d1f;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="unit">
    <img src="byted-mark.svg" alt="">
    <span>ByteDance</span>
  </div>
  <div class="unit">
    <img src="byted-mark.svg" alt="">
  </div>
</body>
</html>
