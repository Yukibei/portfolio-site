<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  /* 占位图模板：通过 URL query 传参 ?no=01&year=2022&zh=入学&en=ENROLLMENT&w=840&h=540 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background:
      radial-gradient(120% 90% at 80% 10%, rgba(255,255,255,0.06), transparent 50%),
      linear-gradient(145deg, #181818, #101010 55%, #161616);
    font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    color: #fff;
    position: relative;
  }
  .frame {
    position: absolute; inset: 14px;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .corner { position: absolute; width: 18px; height: 18px; border-color: rgba(255,255,255,0.4); border-style: solid; border-width: 0; }
  .corner.tl { top: 8px; left: 8px; border-top-width: 2px; border-left-width: 2px; }
  .corner.tr { top: 8px; right: 8px; border-top-width: 2px; border-right-width: 2px; }
  .corner.bl { bottom: 8px; left: 8px; border-bottom-width: 2px; border-left-width: 2px; }
  .corner.br { bottom: 8px; right: 8px; border-bottom-width: 2px; border-right-width: 2px; }
  .no {
    position: absolute; top: 26px; left: 30px;
    font-size: 15px; letter-spacing: 4px; color: rgba(255,255,255,0.35); font-weight: 700;
  }
  .tag {
    position: absolute; top: 26px; right: 30px;
    font-size: 12px; letter-spacing: 3px; color: rgba(255,255,255,0.28); font-weight: 700;
  }
  .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 10px;
  }
  .year {
    font-family: "Arial Black", Arial, sans-serif;
    font-size: clamp(40px, 18vh, 96px); line-height: 1; font-weight: 900;
    color: rgba(255,255,255,0.16); letter-spacing: 4px;
  }
  .zh { font-size: clamp(22px, 7vh, 38px); font-weight: 800; letter-spacing: 6px; }
  .en { font-size: clamp(11px, 3vh, 15px); font-weight: 700; letter-spacing: 6px; color: rgba(255,255,255,0.45); }
  .hint {
    position: absolute; bottom: 26px; left: 0; right: 0;
    text-align: center; font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.22); font-weight: 700;
  }
</style>
</head>
<body>
  <div class="frame"></div>
  <span class="corner tl"></span><span class="corner tr"></span>
  <span class="corner bl"></span><span class="corner br"></span>
  <div class="no" id="no"></div>
  <div class="tag">PHOTO</div>
  <div class="center">
    <div class="year" id="year"></div>
    <div class="zh" id="zh"></div>
    <div class="en" id="en"></div>
  </div>
  <div class="hint">占位图 · 待替换真实照片</div>
<script>
  const q = new URLSearchParams(location.search);
  document.getElementById('no').textContent = q.get('no') || '';
  document.getElementById('year').textContent = q.get('year') || '';
  document.getElementById('zh').textContent = q.get('zh') || '';
  document.getElementById('en').textContent = q.get('en') || '';
</script>
</body>
</html>
