<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  /* 1678x2532 = 卡背面 UV 区域的 2 倍，1:1 像素映射 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1678px; height: 2532px; }
  body {
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background:
      linear-gradient(135deg, rgba(0,166,255,0.08), transparent 30%),
      linear-gradient(315deg, rgba(255,59,92,0.07), transparent 30%),
      #fff;
    color: #111;
    font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
  }
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(to right, rgba(0,0,0,0.035) 0 1px, transparent 1px 108px),
      repeating-linear-gradient(to bottom, rgba(0,0,0,0.035) 0 1px, transparent 1px 108px);
  }
  .slot {
    position: absolute;
    top: 196px;
    left: 50%;
    z-index: 2;
    width: 178px;
    height: 48px;
    transform: translateX(-50%);
    border-radius: 999px;
    background: #111;
    box-shadow: inset 0 0 0 10px rgba(255,255,255,0.14);
  }
  .slot::after {
    content: "";
    position: absolute;
    inset: 13px 36px;
    border-radius: 999px;
    background: #fff;
  }
  .stripe {
    position: relative;
    z-index: 1;
    height: 190px;
    margin-top: 96px;
    background: linear-gradient(90deg, #111 0 58%, #00a6ff 58% 76%, #ff3b5c 76%);
  }
  .top {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 88px 112px 0;
  }
  .top img { width: 540px; }
  .top .tag {
    text-align: right;
    font-size: 40px;
    font-weight: 900;
    letter-spacing: 8px;
  }
  .top .tag span {
    display: block;
    margin-top: 10px;
    color: #777;
    font-size: 26px;
    letter-spacing: 10px;
  }
  .main {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 720px 1fr;
    gap: 88px;
    margin: 96px 112px 80px;
    align-items: center;
  }
  .qr-box {
    padding: 36px;
    border: 8px solid #111;
    background: #fff;
    box-shadow: 30px 30px 0 rgba(0,166,255,0.13), -30px -30px 0 rgba(255,59,92,0.1);
  }
  .qr-box img { width: 100%; display: block; image-rendering: pixelated; }
  .scan .title {
    font-family: "Arial Black", Arial, sans-serif;
    font-size: 96px;
    line-height: 1.05;
    font-weight: 900;
    letter-spacing: 8px;
  }
  .scan .sub {
    margin-top: 38px;
    color: #555;
    font-family: Consolas, "Courier New", monospace;
    font-size: 44px;
  }
  .scan .cn {
    margin-top: 44px;
    color: #777;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 6px;
  }
  .records {
    position: relative;
    z-index: 1;
    margin: 0 112px;
    border-top: 6px solid #111;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 4px solid rgba(0,0,0,0.1);
    padding: 34px 0;
  }
  .row .k {
    color: #777;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 8px;
  }
  .row .v {
    font-size: 46px;
    font-weight: 900;
    letter-spacing: 2px;
  }
  .chips {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 30px;
    margin: 70px 112px 0;
  }
  .chip {
    flex: 1;
    padding: 38px;
    border: 6px solid #111;
    font-size: 44px;
    font-weight: 900;
    letter-spacing: 6px;
    text-align: center;
  }
  .chip.blue { border-color: #00a6ff; color: #0066ff; }
  .chip.red { border-color: #ff3b5c; color: #ff1744; }
  .footer {
    position: relative;
    z-index: 1;
    margin-top: auto;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 112px;
    background: #111;
    color: #fff;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 8px;
  }
</style>
</head>
<body>
  <div class="slot"></div>
  <div class="stripe"></div>
  <header class="top">
    <img src="bytedance.svg" alt="ByteDance">
    <div class="tag">背面信息<span>BACK SIDE</span></div>
  </header>

  <section class="main">
    <div class="qr-box"><img src="qr.png" alt="GitHub QR"></div>
    <div class="scan">
      <div class="title">SCAN<br>FOR<br>PROFILE</div>
      <div class="sub">github.com/Yukibei</div>
      <div class="cn">扫码查看项目与代码仓库</div>
    </div>
  </section>

  <section class="records">
    <div class="row"><span class="k">姓名 NAME</span><span class="v">李怡霖 / YILING LI</span></div>
    <div class="row"><span class="k">邮箱 EMAIL</span><span class="v">2747028274@qq.com</span></div>
    <div class="row"><span class="k">岗位 ROLE</span><span class="v">AI APPLICATION ENGINEER</span></div>
    <div class="row"><span class="k">权限 ACCESS</span><span class="v">OFFICE / LAB / CLOUD</span></div>
  </section>

  <section class="chips">
    <div class="chip blue">AI PLATFORM</div>
    <div class="chip red">R&amp;D INTERN</div>
  </section>

  <footer class="footer">
    <span>BYTEDANCE · EMPLOYEE CARD</span>
    <span>2026</span>
  </footer>
</body>
</html>
